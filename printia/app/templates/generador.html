{% extends "dashboard_layout.html" %}

{% block dashboard_content %}
<div class="generador-view">
    <div class="generador-header">
        <div class="generador-icon">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#2C3E50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Icono representativo del cerebro y la impresora (simplificado) -->
                <path d="M12 2a4 4 0 0 1 4 4v1h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z" />
                <path d="M8 7v2" stroke="#E64D85" stroke-width="2"/>
                <path d="M16 7v2" stroke="#E64D85" stroke-width="2"/>
                <path d="M12 4v5" stroke="#E64D85" stroke-width="2"/>
                <circle cx="12" cy="14" r="2" stroke="#E64D85" fill="#E64D85" />
            </svg>
        </div>
        <h2 class="generador-title">Generador 3D</h2>
    </div>

    <form class="generador-form" action="{{ url_for('main.generar') }}" method="POST">
        <textarea name="prompt" class="generador-textarea" placeholder="Describe tu modelo 3D..." required></textarea>
        <button type="submit" class="btn btn--primary btn--large generador-btn">Generar modelo 3D</button>
    </form>
</div>
{% endblock %}
