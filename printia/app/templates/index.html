{% extends "base.html" %}

{% block title %}PrintIA Solutions - Home{% endblock %}

{% block content %}
<main class="hero">
    <div class="hero__content">
        <h1 class="hero__title">Del texto a<br>la realidad</h1>
        {% if current_user.is_authenticated %}
            <a href="#" class="btn btn--primary btn--large">Empezar a crear</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn btn--primary btn--large">Empezar a crear</a>
        {% endif %}
    </div>
    <div class="hero__image">
        <img src="{{ url_for('static', filename='assets/printer-hero.png') }}" alt="Impresora 3D con modelo generado por IA" />
    </div>
</main>
{% endblock %}
