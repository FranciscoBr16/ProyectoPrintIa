{% extends "base.html" %}

{% block title %}Checkout - PrintIA Solutions{% endblock %}

{% block content %}
<main class="auth-page" style="background-color: var(--color-page-bg);">
    <div class="auth-card" style="max-width: 500px;">
        <h1 class="auth-card__title">Actualizar a PRO</h1>
        <p class="auth-card__subtitle">Completa tus datos de pago para desbloquear todas las funciones.</p>
        
        <form class="auth-form" action="{{ url_for('main.checkout') }}" method="POST">
            <!-- Nombre en la tarjeta -->
            <div class="form-group">
                <label for="nombre_tarjeta" class="form-label">Nombre en la tarjeta</label>
                <input type="text" id="nombre_tarjeta" name="nombre_tarjeta" class="form-input" placeholder="Ej: Juan Pérez" required>
            </div>
            
            <!-- Número de tarjeta -->
            <div class="form-group">
                <label for="numero_tarjeta" class="form-label">Número de tarjeta</label>
                <!-- En un entorno real se usaría un iframe o integración con procesador de pagos -->
                <input type="text" id="numero_tarjeta" name="numero_tarjeta" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>
            
            <div style="display: flex; gap: 16px;">
                <!-- Fecha de expiración -->
                <div class="form-group" style="flex: 1;">
                    <label for="expiracion" class="form-label">Expiración</label>
                    <input type="text" id="expiracion" name="expiracion" class="form-input" placeholder="MM/AA" maxlength="5" required>
                </div>
                
                <!-- CVV -->
                <div class="form-group" style="flex: 1;">
                    <label for="cvv" class="form-label">CVV</label>
                    <input type="text" id="cvv" name="cvv" class="form-input" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <p style="font-size: 0.85rem; color: var(--color-navbar-text); display: flex; align-items: center; gap: 6px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Pago seguro y encriptado. Se te cobrarán $9.99 mensualmente.
                </p>
            </div>
            
            <button type="submit" class="btn btn--primary btn--full">Pagar $9.99</button>
        </form>
        
        <div class="auth-card__footer">
            <a href="{{ url_for('main.planes') }}" class="auth-link">Cancelar y volver a Planes</a>
        </div>
    </div>
</main>
{% endblock %}
