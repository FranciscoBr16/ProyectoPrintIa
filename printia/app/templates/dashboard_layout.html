{% extends "base.html" %}

{% block title %}Dashboard - PrintIA Solutions{% endblock %}

{% block content %}
<div class="dashboard-container">
    <aside class="dashboard-sidebar">
        <a href="{{ url_for('main.generador') }}" class="sidebar-link {% if request.endpoint == 'main.generador' %}sidebar-link--active{% endif %}">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <span>Generador</span>
        </a>
        <a href="{{ url_for('main.galeria') }}" class="sidebar-link {% if request.endpoint == 'main.galeria' %}sidebar-link--active{% endif %}">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Galería</span>
        </a>
    </aside>

    <main class="dashboard-content">
        {% block dashboard_content %}{% endblock %}
    </main>
</div>
{% endblock %}
